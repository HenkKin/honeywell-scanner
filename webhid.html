<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Honeywell HID Scanner Demo</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    #log { white-space: pre; background: #eee; padding: 10px; }
  </style>
</head>
<body>

<h1>Honeywell CT70‑L0 HID Scanner Demo</h1>

<input id="scanInput" autocomplete="off" style="font-size:18px; width: 300px;" />
<div id="lastScan" style="margin-top:20px; font-size:20px; font-weight:bold;"></div>

<h2>Log</h2>
<div id="log"></div>

<script>
const scanInput = document.getElementById('scanInput');
const lastScan  = document.getElementById('lastScan');
const logBox    = document.getElementById('log');

let buffer = '';
let timer  = null;

// Hoe snel een scan moet zijn (ms)
const SCAN_TIMEOUT = 40;

function log(msg) {
  logBox.textContent += msg + "\n";
}

// Zorg dat het inputveld altijd focus heeft
function ensureFocus() {
  if (document.activeElement !== scanInput) {
    scanInput.focus();
  }
}

scanInput.addEventListener('input', (e) => {
  const value = scanInput.value;
 log('input: ' + e.data);
 log('input: ' + value);
  // Reset timer
  clearTimeout(timer);
  timer = setTimeout(() => {
    // Scan is klaar
    const code = value.trim();
    if (code) {
      //lastScan.textContent = "Laatste scan: " + code;
      //log("SCAN: " + code);
    }
    scanInput.value = '';
  }, SCAN_TIMEOUT);
});


scanInput.addEventListener('keydown', (e) => {
  ensureFocus();
  log('keydown: ' + e.key);
  // Enter = einde van de scan
  if (e.key === 'Enter') {
    log("ENTER: " + e.key);
    const code = buffer.trim();
    if (code) {
      lastScan.textContent = "Laatste scan: " + code;
      log("SCAN: " + code);
    }
    buffer = '';
    e.preventDefault();
    return;
  }

  // Alleen echte characters toevoegen
  if (e.key.length === 1) {
    buffer += e.key;

    // Reset timeout
    clearTimeout(timer);
    timer = setTimeout(() => {
      // Te langzaam → waarschijnlijk menselijk typen → buffer resetten
      buffer = '';
    }, SCAN_TIMEOUT);
  }
});

// Start met focus
scanInput.focus();
log("Scanner klaar. Focus staat op inputveld.");
</script>

</body>
</html>
